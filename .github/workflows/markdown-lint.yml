name: Markdown lint

on:
  push:
    branches: [main]
    paths:
      - '**.md'
  pull_request:
    branches: [main]
    paths:
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
        continue-on-error: true

      - name: Check for broken internal links
        run: |
          # Find any markdown links of form [text](path.md) where path.md doesn't exist
          missing=0
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            link=$(echo "$line" | grep -oE '\([^)]*\.md[^)]*\)' | tr -d '()')
            if [ -n "$link" ] && [ ! -f "$(dirname "$file")/$link" ]; then
              echo "Broken link in $file: $link"
              missing=$((missing+1))
            fi
          done < <(grep -rEH '\]\([^)]*\.md[^)]*\)' --include="*.md" .)
          if [ "$missing" -gt 0 ]; then
            echo "Found $missing broken markdown links"
            exit 1
          fi
        shell: bash
